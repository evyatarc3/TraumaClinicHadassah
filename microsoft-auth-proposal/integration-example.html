<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת שאלונים קליניים - מרפאת הטראומה הדסה (גרסת ענן)</title>

<!--
================================================================================
  INTEGRATION PROTOTYPE - מערכת שאלוני טראומה עם אימות Microsoft וענן

  קובץ זה מדגים שילוב מלא של:
  1. אימות Microsoft Entra ID (מחליף את ה-login הנוכחי)
  2. אחסון בענן SharePoint (מחליף את localStorage)
  3. ניהול sessions בענן (היסטוריה מלאה של מטופלים)
  4. מצב offline עם סנכרון אוטומטי

  הקובץ הזה עומד בפני עצמו ולא משנה את index.html הקיים.
  הוא מדגים את כל השינויים הנדרשים כדי לשלב אימות וענן.

  שימו לב: השאלונים עצמם לא כלולים כאן (הם נשארים ב-index.html).
  הדוגמה מתמקדת בשכבת האימות, האחסון, וה-UI החדש.
================================================================================
-->

<!-- MSAL.js v2 - Microsoft Authentication Library -->
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Services -->
<script src="auth-config.js"></script>
<script src="auth-service.js"></script>
<script src="data-service.js"></script>
<script src="cloud-storage-adapter.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#0f172a;min-height:100vh}
.app{max-width:1400px;margin:0 auto;background:#fff;min-height:100vh}

/* ===== Login Page - Microsoft Style ===== */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,.25);text-align:center}
.login-logo{width:120px;height:120px;border-radius:12px;margin-bottom:16px;object-fit:contain}
.login-title{font-size:1.5em;color:#1e3a5f;font-weight:800;margin-bottom:4px}
.login-subtitle{color:#64748b;font-size:.9em;margin-bottom:24px}

/* Microsoft Sign-In Button */
.ms-signin-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;background:#fff;color:#5e5e5e;border:1px solid #8c8c8c;border-radius:4px;font-size:15px;font-weight:600;font-family:'Segoe UI','Heebo',sans-serif;cursor:pointer;transition:all .2s}
.ms-signin-btn:hover{background:#f5f5f5;border-color:#333}
.ms-signin-btn:active{background:#e5e5e5}
.ms-signin-btn:disabled{opacity:.6;cursor:not-allowed}
.ms-signin-btn svg{width:21px;height:21px;flex-shrink:0}

.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#94a3b8;font-size:.8em}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}

.login-security-note{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;font-size:.82em;color:#166534;text-align:right;line-height:1.6}
.login-security-note strong{display:block;margin-bottom:4px}

.login-error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px;margin-top:16px;color:#991b1b;font-size:.85em}

/* Loading States */
.loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:16px}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:1.1em}

/* ===== Header - with user info ===== */
.hdr{background:linear-gradient(135deg,#1e3a5f,#0f172a);color:#fff;padding:16px 24px;display:flex;flex-direction:column;gap:10px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;width:100%}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-logo{width:60px;height:60px;border-radius:10px;object-fit:contain}
.hdr-title-block h1{font-size:1.1em;margin-bottom:2px}
.hdr-title-block p{font-size:.75em;opacity:.85}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-user{text-align:left;font-size:.82em}
.hdr-user .user-name{font-weight:700}
.hdr-user .user-email{opacity:.7;font-size:.9em}
.logout-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.82em;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.25)}

/* Cloud Status Bar */
.cloud-status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:.8em}
.cloud-status{display:flex;align-items:center;gap:6px}
.cloud-dot{width:8px;height:8px;border-radius:50%}
.cloud-actions{display:flex;gap:8px}
.cloud-action-btn{padding:4px 12px;border:1px solid #e2e8f0;background:#fff;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.82em;color:#475569;transition:all .15s}
.cloud-action-btn:hover{background:#f1f5f9;border-color:#94a3b8}

/* ===== Patient History Panel (NEW) ===== */
.history-panel{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:12px 20px}
.history-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;color:#1e3a5f;font-weight:600;font-size:.9em;padding:6px 0}
.history-toggle:hover{color:#3b82f6}
.history-list{max-height:300px;overflow-y:auto;margin-top:10px}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.history-item:hover{border-color:#3b82f6;background:#eff6ff}
.history-item-info{flex:1}
.history-item-name{font-weight:600;color:#1e293b;font-size:.9em}
.history-item-meta{font-size:.75em;color:#64748b;display:flex;gap:12px;margin-top:2px}
.history-badge{padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:600}
.history-badge.complete{background:#dcfce7;color:#166534}
.history-badge.in-progress{background:#dbeafe;color:#1e40af}
.history-badge.new{background:#f3f4f6;color:#6b7280}

/* ===== Intake Form ===== */
.intake-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);padding:20px}
.intake-card{background:#fff;border-radius:20px;padding:40px;max-width:700px;width:100%;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.intake-header{text-align:center;margin-bottom:24px}
.intake-header h1{font-size:1.5em;color:#1e3a5f;margin-bottom:4px}
.intake-header p{color:#64748b;font-size:.9em}
.intake-section{background:#f8fafc;border-radius:12px;padding:20px;margin-bottom:16px}
.intake-section h3{font-size:1em;color:#1e3a5f;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #3b82f6}
.intake-section.examiner h3{border-bottom-color:#10b981}
.intake-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:12px}
.intake-field{display:flex;flex-direction:column;gap:5px}
.intake-field label{font-weight:600;color:#475569;font-size:.82em}
.intake-field input,.intake-field select{padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:.95em;font-family:inherit}
.intake-field input:focus,.intake-field select:focus{outline:none;border-color:#3b82f6}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;border:none;border-radius:10px;font-size:1.1em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:20px}
.start-btn:hover{opacity:.9}

/* Auto-fill from user profile */
.auto-filled{background:#eff6ff;border-color:#93c5fd !important}
.auto-filled-badge{font-size:.7em;color:#3b82f6;font-weight:400}

/* ===== Big Menu (same as existing app) ===== */
.big-menu{padding:40px 20px;background:#f1f5f9;min-height:70vh;display:flex;flex-direction:column;align-items:center}
.big-menu h2{color:#1e293b;font-size:1.8em;margin-bottom:30px;text-align:center}
.big-menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:700px;width:100%;margin:0 auto}
.big-menu-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;border-radius:18px;border:none;cursor:pointer;font-family:inherit;transition:.3s;box-shadow:0 4px 12px rgba(0,0,0,.12);min-height:160px}
.big-menu-btn:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.big-menu-btn .big-icon{font-size:3em;margin-bottom:12px}
.big-menu-btn .big-label{font-size:1.2em;font-weight:700;color:#fff}
.big-menu-btn .big-sublabel{font-size:.8em;color:rgba(255,255,255,.85);margin-top:4px}
.big-menu-btn.btn-questionnaires{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.big-menu-btn.btn-results{background:linear-gradient(135deg,#10b981,#065f46)}
.big-menu-btn.btn-codes{background:linear-gradient(135deg,#ec4899,#831843)}
.big-menu-btn.btn-history{background:linear-gradient(135deg,#8b5cf6,#5b21b6)}
.big-menu-btn.btn-sessions{background:linear-gradient(135deg,#f59e0b,#b45309)}

/* ===== Cloud History View (NEW) ===== */
.cloud-history{padding:20px;background:#f1f5f9;min-height:70vh}
.cloud-history h2{color:#1e293b;font-size:1.4em;margin-bottom:20px;text-align:center}
.history-search{width:100%;max-width:500px;margin:0 auto 20px;display:block;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:1em}
.history-search:focus{outline:none;border-color:#8b5cf6}
.history-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1000px;margin:0 auto}
.history-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid transparent;cursor:pointer;transition:all .2s}
.history-card:hover{border-color:#8b5cf6;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.history-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.history-card-patient{font-size:1.1em;font-weight:700;color:#1e293b}
.history-card-date{font-size:.8em;color:#64748b}
.history-card-quests{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.history-card-quest-tag{padding:3px 8px;background:#eff6ff;color:#1e40af;border-radius:6px;font-size:.72em;font-weight:600}
.history-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid #f1f5f9}
.history-card-therapist{font-size:.78em;color:#64748b}

/* ===== Utility ===== */
.back-btn{padding:12px 24px;background:#64748b;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit;font-size:1em;margin:10px 5px}
.back-btn:hover{background:#475569}

/* ===== Session Expired Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{color:#1e293b;margin-bottom:12px}
.modal p{color:#64748b;font-size:.9em;margin-bottom:20px}
.modal-btn{padding:12px 32px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;font-family:inherit}
.modal-btn:hover{background:#2563eb}

@media(max-width:768px){
  .hdr-top{flex-direction:column;gap:12px;text-align:center}
  .big-menu-grid{grid-template-columns:1fr}
  .intake-row{grid-template-columns:1fr}
  .history-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════════════════════════

const LOGO = null; // יש להחליף ב-base64 של הלוגו או URL

// ═══════════════════════════════════════════════════════════════════════════════
//  Global Instances
// ═══════════════════════════════════════════════════════════════════════════════

let dataService = null;
let cloudStorage = null;

// ═══════════════════════════════════════════════════════════════════════════════
//  CloudStatusBar - סרגל סטטוס חיבור ענן
// ═══════════════════════════════════════════════════════════════════════════════

function CloudStatusBar({ storage, onSaveBackup, onNewPatient }) {
  const [status, setStatus] = useState({ icon: 'loading', text: 'מתחבר...', color: '#94a3b8' });

  useEffect(() => {
    const interval = setInterval(() => {
      if (storage) setStatus(storage.getStatus());
    }, 3000);
    if (storage) setStatus(storage.getStatus());
    return () => clearInterval(interval);
  }, [storage]);

  return (
    <div className="cloud-status-bar">
      <div className="cloud-status">
        <div className="cloud-dot" style={{ background: status.color }} />
        <span>{status.text}</span>
      </div>
      <div className="cloud-actions">
        <button className="cloud-action-btn" onClick={onSaveBackup}>
          שמור גיבוי מקומי
        </button>
        <button className="cloud-action-btn" onClick={onNewPatient}>
          מטופל חדש
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  LoginPage - דף כניסה עם Microsoft
// ═══════════════════════════════════════════════════════════════════════════════

function LoginPage({ onLogin, error: externalError }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(externalError || '');

  const handleMicrosoftLogin = async () => {
    setLoading(true);
    setError('');
    try {
      await authService.login();
      // הדפדפן מופנה ל-Microsoft - לא נגיע לכאן
    } catch (err) {
      setLoading(false);
      setError('שגיאה בהתחברות: ' + err.message);
    }
  };

  return (
    <div className="login-bg">
      <div className="login-card">
        {LOGO && <img src={LOGO} className="login-logo" alt="לוגו הדסה" />}
        <h1 className="login-title">מערכת שאלונים קליניים</h1>
        <p className="login-subtitle">מרפאת הטראומה - המרכז הרפואי הדסה</p>

        <button
          className="ms-signin-btn"
          onClick={handleMicrosoftLogin}
          disabled={loading}
        >
          {/* Microsoft Logo - official SVG */}
          <svg viewBox="0 0 21 21">
            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
          </svg>
          {loading ? 'מתחבר...' : 'היכנס עם חשבון Microsoft הדסה'}
        </button>

        <div className="login-divider">גישה מאובטחת למטפלים מורשים בלבד</div>

        <div className="login-security-note">
          <strong>אבטחת מידע:</strong>
          הגישה למערכת מותרת אך ורק למטפלי הקליניקה עם חשבון Microsoft ארגוני.
          כל ההתחברויות מתועדות. הנתונים מוצפנים ונשמרים בענן Microsoft המאובטח.
        </div>

        {error && <div className="login-error-banner">{error}</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  IntakePage - טופס רישום מטופל (משופר עם auto-fill מפרופיל)
// ═══════════════════════════════════════════════════════════════════════════════

function IntakePage({ userProfile, onSubmit }) {
  const [form, setForm] = useState({
    name: '',
    patID: '',
    age: '',
    gender: 'בחר',
    diag: '',
    sessionDate: new Date().toISOString().split('T')[0],
    sessionType: 'בדיקה ראשונית',
    examName: userProfile?.name || '', // auto-fill שם הבודק מהפרופיל
  });

  const update = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

  const handleSubmit = () => {
    if (!form.name || !form.age) {
      alert('אנא מלא שם וגיל');
      return;
    }
    onSubmit(form);
  };

  return (
    <div className="intake-bg">
      <div className="intake-card">
        <div className="intake-header">
          <h1>טופס רישום חדש</h1>
          <p>אנא מלא את הפרטים הבסיסיים</p>
        </div>

        <div className="intake-section">
          <h3>פרטי מטופל</h3>
          <div className="intake-row">
            <div className="intake-field">
              <label>שם</label>
              <input type="text" placeholder="שם מלא" value={form.name}
                onChange={e => update('name', e.target.value)} />
            </div>
            <div className="intake-field">
              <label>ת.ז.</label>
              <input type="text" placeholder="תעודת זהות" value={form.patID}
                onChange={e => update('patID', e.target.value)} />
            </div>
            <div className="intake-field">
              <label>גיל</label>
              <input type="number" placeholder="גיל" value={form.age}
                onChange={e => update('age', e.target.value)} />
            </div>
          </div>
          <div className="intake-row">
            <div className="intake-field">
              <label>מין</label>
              <select value={form.gender} onChange={e => update('gender', e.target.value)}>
                <option>בחר</option>
                <option>זכר</option>
                <option>נקבה</option>
                <option>אחר</option>
              </select>
            </div>
            <div className="intake-field">
              <label>אבחנה עיקרית</label>
              <input type="text" placeholder="אבחנה" value={form.diag}
                onChange={e => update('diag', e.target.value)} />
            </div>
          </div>
        </div>

        <div className="intake-section">
          <h3>פרטי בדיקה</h3>
          <div className="intake-row">
            <div className="intake-field">
              <label>תאריך</label>
              <input type="date" value={form.sessionDate}
                onChange={e => update('sessionDate', e.target.value)} />
            </div>
            <div className="intake-field">
              <label>סוג בדיקה</label>
              <select value={form.sessionType} onChange={e => update('sessionType', e.target.value)}>
                <option>בדיקה ראשונית</option>
                <option>מעקב</option>
              </select>
            </div>
          </div>
        </div>

        <div className="intake-section examiner">
          <h3>פרטי בודק</h3>
          <div className="intake-row">
            <div className="intake-field">
              <label>
                שם הבודק
                {userProfile?.name && <span className="auto-filled-badge"> (מולא אוטומטית מהפרופיל)</span>}
              </label>
              <input type="text" placeholder="שם הבודק" value={form.examName}
                className={userProfile?.name ? 'auto-filled' : ''}
                onChange={e => update('examName', e.target.value)} />
            </div>
          </div>
        </div>

        <button className="start-btn" onClick={handleSubmit}>התחל</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  CloudHistory - צפייה בהיסטוריית מטופלים מהענן (פיצ'ר חדש!)
// ═══════════════════════════════════════════════════════════════════════════════

function CloudHistory({ onLoadSession, onBack }) {
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');

  useEffect(() => {
    loadSessions();
  }, []);

  const loadSessions = async () => {
    setLoading(true);
    try {
      if (cloudStorage) {
        const allSessions = await cloudStorage.loadAllMySessions();
        setSessions(allSessions);
      }
    } catch (err) {
      console.error('שגיאה בטעינת היסטוריה:', err);
    } finally {
      setLoading(false);
    }
  };

  const filtered = sessions.filter(s => {
    if (!search) return true;
    const term = search.toLowerCase();
    return (
      (s.patientInitials || '').toLowerCase().includes(term) ||
      (s.sessionDate || '').includes(term) ||
      (s.completedQuestionnaires || '').toLowerCase().includes(term)
    );
  });

  const statusText = { 'complete': 'הושלם', 'in_progress': 'בתהליך', 'new': 'חדש' };
  const statusClass = { 'complete': 'complete', 'in_progress': 'in-progress', 'new': 'new' };

  return (
    <div className="cloud-history">
      <button className="back-btn" onClick={onBack} style={{ marginBottom: 20 }}>
        חזור לתפריט הראשי
      </button>
      <h2>היסטוריית מטופלים בענן</h2>

      <input
        className="history-search"
        placeholder="חיפוש לפי שם, תאריך, או שאלון..."
        value={search}
        onChange={e => setSearch(e.target.value)}
      />

      {loading ? (
        <div style={{ textAlign: 'center', padding: 40, color: '#64748b' }}>
          <div className="loading-spinner" style={{ margin: '0 auto 16px', borderColor: 'rgba(0,0,0,.1)', borderTopColor: '#8b5cf6' }} />
          טוען היסטוריה מהענן...
        </div>
      ) : filtered.length === 0 ? (
        <div style={{ textAlign: 'center', padding: 40, color: '#64748b' }}>
          {search ? 'לא נמצאו תוצאות' : 'אין היסטוריית מטופלים'}
        </div>
      ) : (
        <div className="history-cards">
          {filtered.map((s, i) => (
            <div key={s.id || i} className="history-card" onClick={() => onLoadSession(s)}>
              <div className="history-card-header">
                <div>
                  <div className="history-card-patient">{s.patientInitials || '??'}</div>
                  <div style={{ fontSize: '.8em', color: '#64748b' }}>
                    גיל {s.patientAge || '?'} | {s.patientGender || ''}
                  </div>
                </div>
                <div style={{ textAlign: 'left' }}>
                  <span className={`history-badge ${statusClass[s.status] || 'new'}`}>
                    {statusText[s.status] || s.status}
                  </span>
                </div>
              </div>

              {s.completedQuestionnaires && (
                <div className="history-card-quests">
                  {s.completedQuestionnaires.split(',').map((q, qi) => (
                    <span key={qi} className="history-card-quest-tag">{q.trim()}</span>
                  ))}
                </div>
              )}

              <div className="history-card-footer">
                <span className="history-card-therapist">{s.therapistName}</span>
                <span className="history-card-date">
                  {s.sessionDate || (s.lastModified ? new Date(s.lastModified).toLocaleDateString('he-IL') : '')}
                </span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  BigMenu - תפריט ראשי (משופר עם כפתור היסטוריה)
// ═══════════════════════════════════════════════════════════════════════════════

function BigMenu({ intake, completedQ, onNavigate }) {
  const completedCount = completedQ ? Object.values(completedQ).filter(Boolean).length : 0;

  return (
    <div className="big-menu">
      <h2>שלום, {intake?.examName || 'מטפל'}</h2>
      <p style={{ color: '#64748b', marginBottom: 20, marginTop: -20 }}>
        מטופל: {intake?.name} | גיל: {intake?.age}
      </p>
      <div className="big-menu-grid">
        <button className="big-menu-btn btn-questionnaires" onClick={() => onNavigate('questionnaires')}>
          <span className="big-icon">📋</span>
          <span className="big-label">שאלונים</span>
          <span className="big-sublabel">מילוי שאלונים קליניים</span>
        </button>
        <button className="big-menu-btn btn-results" onClick={() => onNavigate('results')}>
          <span className="big-icon">📊</span>
          <span className="big-label">תוצאות</span>
          <span className="big-sublabel">{completedCount > 0 ? `${completedCount} שאלונים הושלמו` : 'צפייה בתוצאות'}</span>
        </button>
        <button className="big-menu-btn btn-codes" onClick={() => onNavigate('diag')}>
          <span className="big-icon">🏥</span>
          <span className="big-label">אבחנות F</span>
          <span className="big-sublabel">קודי ICD-10</span>
        </button>
        <button className="big-menu-btn btn-history" onClick={() => onNavigate('cloud-history')}>
          <span className="big-icon">☁️</span>
          <span className="big-label">היסטוריה</span>
          <span className="big-sublabel">מטופלים קודמים מהענן</span>
        </button>
        <button className="big-menu-btn btn-sessions" onClick={() => onNavigate('sessions')}>
          <span className="big-icon">📅</span>
          <span className="big-label">פגישות</span>
          <span className="big-sublabel">ניהול פגישות</span>
        </button>
      </div>
    </div>
  );
}

      <p style={{ color: '#64748b', maxWidth: 500, margin: '0 auto', lineHeight: 1.8 }}>
        {description}
      </p>
      <div style={{
        background: '#f8fafc', border: '2px dashed #e2e8f0', borderRadius: 12,
        padding: 30, marginTop: 24, maxWidth: 500, margin: '24px auto 0'
      }}>
        <p style={{ color: '#94a3b8', fontWeight: 600 }}>
          תוכן זה יגיע מה-index.html הקיים ללא שינוי.

          השאלונים, הניקוד, והאקספורט ממשיכים לעבוד כרגיל.

// ═══════════════════════════════════════════════════════════════════════════════
//  SessionExpiredModal
// ═══════════════════════════════════════════════════════════════════════════════

function SessionExpiredModal({ onRelogin }) {
  return (
    <div className="modal-overlay">
      <div className="modal">
        <h3>פג תוקף החיבור</h3>
        <p>
          החיבור שלך פג לאחר חוסר פעילות. הנתונים נשמרו בענן.
          יש להתחבר מחדש כדי להמשיך.
        </p>
        <button className="modal-btn" onClick={onRelogin}>התחבר מחדש</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  Main App
// ═══════════════════════════════════════════════════════════════════════════════

function App() {
  // Auth state
  const [authState, setAuthState] = useState('loading'); // loading, unauthenticated, verifying, unauthorized, ready
  const [authError, setAuthError] = useState('');
  const [userProfile, setUserProfile] = useState(null);
  const [showSessionExpired, setShowSessionExpired] = useState(false);

  // App state (same as existing app)
  const [intake, setIntake] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [currentSession, setCurrentSession] = useState(null);
  const [activeView, setActiveView] = useState('bigmenu');
  const [answers, setAnswers] = useState({});
  const [allQAnswers, setAllQAnswers] = useState({});
  const [results, setResults] = useState({});
  const [completedQ, setCompletedQ] = useState({});
  const [selectedQ, setSelectedQ] = useState(null);
  const [selectedDiags, setSelectedDiags] = useState([]);

  // Cloud storage ref
  const storageRef = useRef(null);

  // ═════════ שלב 1: אתחול אימות ═════════
  useEffect(() => {
    initializeAuth();
  }, []);

  const initializeAuth = async () => {
    try {
      setAuthState('loading');

      const user = await authService.initialize({
        onSessionExpired: () => setShowSessionExpired(true),
        onAuthStateChanged: (state, error) => {
          if (state === 'unauthorized') {
            setAuthState('unauthorized');
          }
        }
      });

      if (!user) {
        setAuthState('unauthenticated');
        return;
      }

      // ═════════ שלב 2: בדיקת הרשאות קבוצה ═════════
      setAuthState('verifying');

      const { authorized } = await authService.verifyGroupMembership();
      if (!authorized) {
        setAuthState('unauthorized');
        setAuthError('החשבון שלך אינו חבר בקבוצת המטפלים המורשית. פנה למנהל המערכת.');
        return;
      }

      // קבלת פרופיל מורחב
      const profile = authService.getCurrentUser();
      setUserProfile(profile);

      // ═════════ שלב 3: אתחול ענן ═════════
      dataService = new DataService(authService);
      cloudStorage = new CloudStorageAdapter(authService, dataService);
      storageRef.current = cloudStorage;

      const cloudConnected = await cloudStorage.initialize();

      // ═════════ שלב 4: שחזור נתונים מהענן ═════════
      if (cloudConnected) {
        const savedData = await cloudStorage.load();
        if (savedData && savedData.intake) {
          restoreState(savedData);
        }
      }

      setAuthState('ready');

    } catch (error) {
      console.error('שגיאה באתחול:', error);
      // אם יש משתמש אבל הענן נכשל - ממשיכים בלי ענן
      if (authService.isAuthenticated()) {
        setUserProfile(authService.getCurrentUser());
        setAuthState('ready');
      } else {
        setAuthState('unauthenticated');
        setAuthError(error.message);
      }
    }
  };

  // ═════════ Auto-Save לענן בכל שינוי state ═════════
  useEffect(() => {
    if (!intake || authState !== 'ready') return;

    const stateData = {
      intake, sessions, currentSession, results, completedQ,
      answers, allQAnswers, selectedQ, activeView, selectedDiags,
      timestamp: Date.now()
    };

    if (storageRef.current) {
      storageRef.current.save(stateData);
    }
  }, [intake, sessions, currentSession, results, completedQ, answers, allQAnswers, selectedQ, activeView, selectedDiags]);

  // ═════════ שחזור state ═════════
  const restoreState = (data) => {
    if (data.intake) setIntake(data.intake);
    if (data.sessions) setSessions(data.sessions);
    if (data.currentSession) setCurrentSession(data.currentSession);
    if (data.results) setResults(data.results);
    if (data.completedQ) setCompletedQ(data.completedQ);
    if (data.answers) setAnswers(data.answers);
    if (data.allQAnswers) setAllQAnswers(data.allQAnswers);
    if (data.selectedQ) setSelectedQ(data.selectedQ);
    if (data.activeView) setActiveView(data.activeView);
    if (data.selectedDiags) setSelectedDiags(data.selectedDiags);
  };

  // ═════════ Intake submit ═════════
  const handleIntakeSubmit = (form) => {
    const intakeData = {
      name: form.name, age: form.age, gender: form.gender,
      patID: form.patID, diag: form.diag,
      sessionDate: form.sessionDate, sessionType: form.sessionType,
      examName: form.examName
    };
    const firstSession = { date: form.sessionDate, type: form.sessionType };
    setIntake(intakeData);
    setCurrentSession(firstSession);
    setSessions([firstSession]);
  };

  // ═════════ New patient ═════════
  const handleNewPatient = async () => {
    if (intake && !confirm('האם אתה בטוח? הנתונים הנוכחיים נשמרו בענן.')) return;
    if (storageRef.current) {
      await storageRef.current.startNewSession();
    }
    setIntake(null);
    setCurrentSession(null);
    setSessions([]);
    setActiveView('bigmenu');
    setSelectedQ(null);
    setAnswers({});
    setAllQAnswers({});
    setResults({});
    setCompletedQ({});
    setSelectedDiags([]);
  };

  // ═════════ Load session from history ═════════
  const handleLoadFromHistory = (session) => {
    if (intake && !confirm('טעינת מטופל קודם תחליף את הנתונים הנוכחיים. להמשיך?')) return;
    if (session.data) {
      restoreState(session.data);
      if (storageRef.current) {
        storageRef.current._currentItemId = session.id;
      }
    }
    setActiveView('bigmenu');
  };

  // ═════════ Backup ═════════
  const handleSaveBackup = () => {
    const backup = { intake, sessions, currentSession, results, completedQ, answers, allQAnswers, selectedQ, activeView, selectedDiags };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_${intake?.name?.replace(/\s/g, '_') || 'unknown'}_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ═════════ Logout ═════════
  const handleLogout = async () => {
    if (storageRef.current) {
      // שמירה אחרונה לפני התנתקות
      if (intake) {
        await storageRef.current.save({
          intake, sessions, currentSession, results, completedQ,
          answers, allQAnswers, selectedQ, activeView, selectedDiags,
          timestamp: Date.now()
        });
      }
    }
    await authService.logout();
  };

  // ═══════════════════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════════════════

  // Loading
  if (authState === 'loading') {
    return (
      <div className="loading-overlay">
        <div className="loading-spinner" />
        <div className="loading-text">מאמת משתמש...</div>
      </div>
    );
  }

  // Verifying group membership
  if (authState === 'verifying') {
    return (
      <div className="loading-overlay">
        <div className="loading-spinner" />
        <div className="loading-text">בודק הרשאות...</div>
      </div>
    );
  }

  // Not logged in
  if (authState === 'unauthenticated') {
    return <LoginPage error={authError} />;
  }

  // Unauthorized (not in group)
  if (authState === 'unauthorized') {
    return (
      <div className="login-bg">
        <div className="login-card">
          <h1 className="login-title" style={{ color: '#dc2626' }}>אין הרשאה</h1>
          <p style={{ color: '#64748b', margin: '16px 0 24px', lineHeight: 1.7 }}>
            {authError || 'החשבון שלך לא מורשה לגשת למערכת זו.'}
          </p>
          <p style={{ color: '#94a3b8', fontSize: '.85em' }}>
            אם אתה מטפל בקליניקה ואמור לקבל גישה, פנה למנהל המערכת.
          </p>
          <button className="ms-signin-btn" style={{ marginTop: 20 }} onClick={() => authService.logout()}>
            התנתק ונסה עם חשבון אחר
          </button>
        </div>
      </div>
    );
  }

  // ═════════ Authenticated & Authorized ═════════

  // Session expired modal
  if (showSessionExpired) {
    return <SessionExpiredModal onRelogin={() => authService.login()} />;
  }

  // Intake form (no patient loaded)
  if (!intake) {
    return <IntakePage userProfile={userProfile} onSubmit={handleIntakeSubmit} />;
  }

  // Main app with header
  return (
    <div className="app">
      {/* Header */}
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-right">
            {LOGO && <img src={LOGO} className="hdr-logo" alt="לוגו" />}
            <div className="hdr-title-block">
              <h1>מערכת שאלונים - מרפאת הטראומה</h1>
              <p>מטופל: {intake.name} | גיל: {intake.age} | {currentSession?.date || ''}</p>
            </div>
          </div>
          <div className="hdr-left">
            <div className="hdr-user">
              <div className="user-name">{userProfile?.name}</div>
              <div className="user-email">{userProfile?.email}</div>
            </div>
            <button className="logout-btn" onClick={handleLogout}>התנתק</button>
          </div>
        </div>
      </div>

      {/* Cloud Status Bar */}
      <CloudStatusBar
        storage={storageRef.current}
        onSaveBackup={handleSaveBackup}
        onNewPatient={handleNewPatient}
      />

      {/* Content */}
      {activeView === 'bigmenu' && (
        <BigMenu intake={intake} completedQ={completedQ} onNavigate={setActiveView} />
      )}

      {activeView === 'cloud-history' && (
        <CloudHistory onLoadSession={handleLoadFromHistory} onBack={() => setActiveView('bigmenu')} />
      )}

      {activeView === 'questionnaires' && (
        <PlaceholderView
          title="שאלונים"
          description="כאן יופיעו כל השאלונים הקליניים (BDI-II, PHQ-9, GAD-7, DASS-21, PCL-5, ועוד). כל הלוגיקה של השאלונים, הניקוד, והאקספורט ממשיכים לעבוד בדיוק כמו באפליקציה הקיימת."
          onBack={() => setActiveView('bigmenu')}
        />
      )}

      {activeView === 'results' && (
        <PlaceholderView
          title="תוצאות"
          description="צפייה בתוצאות כל השאלונים שהושלמו, כולל ציונים, רמות חומרה, ותת-תחומים. ייצוא לאקסל ממשיך לעבוד כרגיל."
          onBack={() => setActiveView('bigmenu')}
        />
      )}

      {activeView === 'diag' && (
        <PlaceholderView
          title="אבחנות F"
          description="בחירת קודי ICD-10/DSM-5 לאבחון. ללא שינוי מהאפליקציה הקיימת."
          onBack={() => setActiveView('bigmenu')}
        />
      )}

      {activeView === 'sessions' && (
        <PlaceholderView
          title="ניהול פגישות"
          description="הוספת פגישות מעקב ומעבר בין פגישות. ללא שינוי מהאפליקציה הקיימת."
          onBack={() => setActiveView('bigmenu')}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
//  Mount
// ═══════════════════════════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
